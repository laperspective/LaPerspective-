<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perspective</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* LAYOUT */
.layout {
    display: grid;
    grid-template-columns: 240px 1fr 300px;
    grid-template-rows: 90px 1fr;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    grid-row: 1 / 3;
    background: #0b3d2e;
    color: white;
    padding: 20px;
}

.logo {
    border: 2px solid white;
    padding: 10px;
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
}

/* MENU */
.menu a {
    display: flex;
    align-items: center;
    gap: 10px;
    color: white;
    text-decoration: none;
    margin: 10px 0;
}

.menu a:hover {
    opacity: 0.7;
}

/* HEADER */
.header {
    grid-column: 2 / 4;
    background: #0b3d2e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.header h1 {
    margin: 0;
}

/* MAIN */
.main {
    padding: 30px;
}

.hero {
    background: white;
    padding: 25px;
    margin-bottom: 20px;
}

.hero h2 {
    font-size: 28px;
}

/* ARTICLES */
.articles {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.article {
    display: block;
    background: white;
    padding: 20px;
    text-decoration: none;
    color: black;
    transition: 0.2s;
}

.article:hover {
    transform: translateY(-3px);
}

/* RIGHT */
.right {
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
    .layout {
        grid-template-columns: 1fr;
    }
    .sidebar {
        display: none;
    }
    .articles {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- MENU -->
<div class="sidebar">
    <a href="index.html" class="logo">LP</a>

    <div class="menu">
        <a href="actu.html"><i class="fas fa-newspaper"></i> Actualité</a>
        <a href="societe.html"><i class="fas fa-comments"></i> Société</a>
        <a href="international.html"><i class="fas fa-globe"></i> International</a>
        <a href="culture.html"><i class="fas fa-masks-theater"></i> Culture</a>
        <a href="analyses.html"><i class="fas fa-chart-line"></i> Analyses</a>
        <a href="local.html"><i class="fas fa-map-marker-alt"></i> Vie locale</a>
        <a href="economie.html"><i class="fas fa-coins"></i> Économie</a>
        <a href="debat.html"><i class="fas fa-fire"></i> Débat</a>
        <a href="interviews.html"><i class="fas fa-microphone"></i> Interviews</a>
        <a href="necrologie.html"><i class="fas fa-cross"></i> Nécrologie</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1><a href="index.html" style="color:white;text-decoration:none;">La Perspective</a></h1>
</div>

<!-- MAIN -->
<<div class="main">

<h2>International</h2>

<div class="articles">
    <a href="#" class="article">
        <h3>Europe</h3>
        <p>Situation actuelle.</p>
    </a>

    <a href="#" class="article">
        <h3>États-Unis</h3>
        <p>Actualité politique.</p>
    </a>

    <a href="#" class="article">
        <h3>Asie</h3>
        <p>Évolutions économiques.</p>
    </a>
</div>

</div>

<!-- RIGHT -->
<div class="right">
    <div class="box">
        <h3>Débat</h3>
        <p>Question de la semaine</p>
    </div>
</div>

</div>

</body>
</html>
