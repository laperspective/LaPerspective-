<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Économie - La Perspective</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

.layout {
    display: grid;
    grid-template-columns: 240px 1fr 300px;
    grid-template-rows: 100px 1fr;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    grid-row: 1 / 3;
    background: #0b3d2e;
    color: white;
    padding: 20px;
}

.logo {
    border: 2px solid white;
    padding: 10px;
    text-align: center;
    margin-bottom: 20px;
}

.menu a {
    display: flex;
    gap: 10px;
    color: white;
    text-decoration: none;
    margin: 10px 0;
}

/* HEADER */
.header {
    grid-column: 2 / 4;
    background: #0b3d2e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.header h1 {
    margin: 0;
}

/* MAIN */
.main {
    padding: 30px;
}

.hero {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
}

.articles {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

article {
    background: white;
    padding: 20px;
}

/* RIGHT */
.right {
    padding: 20px;
}

.box {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .layout {
        grid-template-columns: 1fr;
    }

    .sidebar {
        display: none;
    }

    .articles {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="index.html" class="logo">LP</a>

    <div class="menu">
        <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
        <a href="#"><i class="fas fa-newspaper"></i> Actualité</a>
        <a href="#"><i class="fas fa-coins"></i> Économie</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Économie</h1>
</div>

<!-- MAIN -->
<div class="main">

    <div class="hero">
        <h2>Inflation : une hausse qui inquiète</h2>
        <p>Analyse des dernières tendances économiques...</p>
    </div>

    <div class="articles">
        <article>
            <h3>Marchés financiers en baisse</h3>
            <p>Résumé rapide...</p>
        </article>

        <article>
            <h3>Le pouvoir d’achat en question</h3>
            <p>Résumé rapide...</p>
        </article>
    </div>

</div>

<!-- RIGHT -->
<div class="right">

    <div class="box">
        <h3>Suivi des marchés</h3>

        <!-- WIDGET BOURSE -->
        <iframe src="https://widget.finnhub.io/widgets/forex?symbol=EURUSD" width="100%" height="200"></iframe>
    </div>

    <div class="box">
        <h3>À retenir</h3>
        <p>Résumé des points clés économiques.</p>
    </div>

</div>

</div>

</body>
</html>
