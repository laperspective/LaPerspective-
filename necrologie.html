<style>

body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* LAYOUT */
.layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 90px 1fr;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    grid-row: 1 / 3;
    background: #0b3d2e;
    color: white;
    padding: 20px;
}

.logo {
    border: 2px solid white;
    padding: 10px;
    text-align: center;
    margin-bottom: 20px;
}

.menu a {
    display: flex;
    gap: 10px;
    color: white;
    text-decoration: none;
    margin: 10px 0;
}

/* HEADER */
.header {
    grid-column: 2;
    background: #0b3d2e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MAIN */
.main {
    padding: 20px;
}

/* GRILLE NECROLOGIE */
.necro-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
}

/* CARTE */
.necro-card {
    background: white;
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* NOM */
.necro-name {
    background: #111;
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* IMAGE */
.necro-img img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* INFOS */
.necro-info {
    padding: 10px;
    font-size: 14px;
}

.necro-info p {
    margin: 5px 0;
}

/* RESPONSIVE */
@media (max-width: 1200px) {
    .necro-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {

    .layout {
        grid-template-columns: 1fr;
    }

    .sidebar {
        display: none;
    }

    .necro-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 480px) {
    .necro-grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>
