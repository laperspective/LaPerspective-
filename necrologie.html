<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* LAYOUT */
.layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 90px 1fr;
}

/* SIDEBAR */
.sidebar {
    grid-row: 1 / 3;
    background: #0b3d2e;
    color: white;
    padding: 25px 20px;
}

.logo {
    border: 2px solid white;
    padding: 12px;
    text-align: center;
    margin-bottom: 30px;
    font-size: 22px;
    color: white !important;
    text-decoration: none;
    display: block;
}

/* MENU */
.menu {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.menu a {
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
    text-decoration: none;
}

/* HEADER */
.header {
    grid-column: 2;
    background: #0b3d2e;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.header h1 {
    margin: 0;
}

/* MAIN */
.main {
    padding: 40px;
    max-width: 900px;
    margin: auto;
}
}

/* TITRE */
.section-title {
    font-size: 28px;
    margin-bottom: 30px;
    border-bottom: 2px solid #ddd;
    padding-bottom: 10px;
}

/* GRID */
.necro-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 25px;
}

/* CARD */
.necro-card {
    background: white;
    display: flex;
    flex-direction: column;
    transition: 0.2s;
}

.necro-card:hover {
    transform: translateY(-5px);
}

/* NAME */
.necro-name {
    background: #111;
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* IMAGE */
.necro-img img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* INFO */
.necro-info {
    padding: 15px;
    font-size: 14px;
    line-height: 1.6;
}

.necro-info strong {
    display: block;
    margin-top: 5px;
}
    .menu-btn {
    display: none;
    position: absolute;
    left: 15px;
    top: 25px;
    font-size: 26px;
    color: white;
    z-index: 3000;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
}

.overlay.active {
    display: block;
}

/* MOBILE */
@media (max-width: 1200px) {
    .necro-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .layout {
        grid-template-columns: 1fr;
    }

    .sidebar {
        display: none;
    }

    .necro-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 480px) {
    .necro-grid {
        grid-template-columns: 1fr;
    }
}
@media (max-width: 768px) {

    .layout {
        grid-template-columns: 1fr;
    }

    .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        width: 240px;
        height: 100%;
        transition: 0.3s;
    }

    .sidebar.active {
        left: 0;
    }

    .menu-btn {
        display: block;
    }
}
</style>
</head>

</html>
