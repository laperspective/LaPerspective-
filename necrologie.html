<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nécrologie - La Perspective</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 200px;
    height: 100vh;
    background: #0b3d2e;
    color: white;
    padding: 20px;
    z-index: 2000;
}

.logo {
    border: 2px solid white;
    padding: 12px;
    text-align: center;
    margin-bottom: 30px;
    color: white;
    text-decoration: none;
    display: block;
}

/* MENU */
.menu {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.menu a {
    color: white;
    text-decoration: none;
}

/* CONTENT */
.content {
    margin-left: 240px;
}

/* HEADER */
.header {
    background: #0b3d2e;
    color: white;
    padding: 30px;
    text-align: center;
}

/* TITRE */
.header h1 {
    margin: 0;
}

/* GRID NECRO */
.necro-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    padding: 30px;
}

/* CARD */
.necro-card {
    background: white;
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.necro-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* NOM */
.necro-name {
    background:#0b3d2e;
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* IMAGE */
.necro-img img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* INFOS */
.necro-info {
    padding: 10px;
    font-size: 14px;
}

.necro-info p {
    margin: 5px 0;
}

/* MOBILE MENU */
.menu-btn {
    display: none;
    position: fixed;
    top: 20px;
    left: 15px;
    font-size: 26px;
    color: white;
    z-index: 3000;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
}

.overlay.active {
    display: block;
}

/* RESPONSIVE */
@media (max-width: 1200px) {
    .necro-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

/* RESPONSIVE */
@media (max-width: 768px) {

    .sidebar {
        left: -220px;
        transition: 0.3s;
    }

    .sidebar.active {
        left: 0;
    }

    .content {
        margin-left: 0;
    }

    .menu-btn {
        display: block;
    }

    .articles {
        grid-template-columns: 1fr;
    }
}


    .necro-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 480px) {
    .necro-grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="index.html" class="logo">LP</a>

     <div class="menu">
        <a href="actu.html"><i class="fas fa-newspaper"></i> Actualité</a>
        <a href="societe.html"><i class="fas fa-comments"></i> Société</a>
        <a href="international.html"><i class="fas fa-globe"></i> International</a>
        <a href="culture.html"><i class="fas fa-masks-theater"></i> Culture</a>
        <a href="analyses.html"><i class="fas fa-chart-line"></i> Analyses</a>
        <a href="local.html"><i class="fas fa-map-marker-alt"></i> Vie locale</a>
        <a href="economie.html"><i class="fas fa-coins"></i> Économie</a>
        <a href="debat.html"><i class="fas fa-fire"></i> Débat</a>
        <a href="interviews.html"><i class="fas fa-microphone"></i> Interviews</a>
        <a href="necrologie.html"><i class="fas fa-cross"></i> Nécrologie</a>
    </div>
</div>
<!-- CONTENT -->
<div class="content">

    <div class="header">
        <h1>Nécrologie</h1>
        <p>Hommage aux figures disparues</p>
    </div>

    <div class="necro-grid">

        <!-- CARTE -->
        <div class="necro-card">
            <div class="necro-name">Nom de la personne</div>
            <div class="necro-img">
                <img src="https://picsum.photos/300/200">
            </div>
            <div class="necro-info">
                <p><strong>Naissance :</strong> 1940</p>
                <p><strong>Décès :</strong> 2025</p>
                <p><strong>Âge :</strong> 85 ans</p>
                <p><strong>Cause :</strong> Naturelle</p>
            </div>
        </div>

        <!-- DUPLIQUE CE BLOC -->

    </div>

</div>

<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}
</script>

</body>
</html>
