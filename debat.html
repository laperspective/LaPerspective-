<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Débat - La Perspective</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BASE */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* SIDEBAR (IDENTIQUE) */
.sidebar {
    background: #0b3d2e;
    color: white;
    padding: 25px 20px;
    position: fixed;
    width: 240px;
    height: 100%;
}

.logo {
    border: 2px solid white;
    padding: 12px;
    text-align: center;
    margin-bottom: 30px;
    color: white;
    text-decoration: none;
}

/* CONTENT */
.content {
    margin-left: 240px;
}

/* HEADER */
.header {
    background: linear-gradient(135deg, #0b3d2e, #145c45);
    color: white;
    padding: 40px;
    text-align: center;
}

/* QUESTION */
.question {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 40px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.question h2 {
    font-size: 28px;
}

/* GRAPHIQUE */
.chart-container {
    max-width: 500px;
    margin: 40px auto;
}

/* FORM */
.form-box {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    margin-bottom: 40px;
}

/* AVIS */
.opinions {
    max-width: 900px;
    margin: auto;
    padding-bottom: 40px;
}

.opinion {
    background: white;
    padding: 20px;
    margin-bottom: 15px;
    border-left: 4px solid #0b3d2e;
}

/* MOBILE */
@media (max-width: 768px) {

    .sidebar {
        left: -260px;
        transition: 0.3s;
    }

    .sidebar.active {
        left: 0;
    }

    .content {
        margin-left: 0;
    }
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="index.html" class="logo">LP</a>
</div>

<!-- CONTENT -->
<div class="content">

    <div class="header">
        <h1>Débat de la semaine</h1>
        <p>Exprimez votre opinion</p>
    </div>

    <!-- QUESTION -->
    <div class="question">
        <h2>Faut-il interdire le téléphone au lycée ?</h2>
    </div>

    <!-- GRAPHIQUE -->
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <!-- FORMULAIRE -->
    <div class="form-box">
        <h3>Donnez votre avis</h3>
        <iframe src="TON LIEN GOOGLE FORM" width="100%" height="400"></iframe>
    </div>

    <!-- AVIS -->
    <div class="opinions">
        <div class="opinion">“Oui, cela améliore la concentration.”</div>
        <div class="opinion">“Non, c’est un outil utile.”</div>
    </div>

</div>

<script>
function toggleMenu() {
    document.querySelector(".sidebar").classList.toggle("active");
    document.querySelector(".overlay").classList.toggle("active");
}

// GRAPHIQUE
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Pour', 'Contre', 'Sans avis'],
        datasets: [{
            data: [40, 35, 25],
        }]
    }
});
</script>

</body>
</html>
