<style>

/* BASE */
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f5f5f5;
}

/* LAYOUT */
.layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    background: #0b3d2e;
    color: white;
    padding: 20px;
}

.logo {
    border: 2px solid white;
    display: inline-block;
    padding: 10px;
    margin-bottom: 20px;
    font-size: 24px;
    text-align: center;
}

.menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.menu a {
    color: white;
    text-decoration: none;
    display: flex;
    gap: 10px;
}

.menu a:hover {
    opacity: 0.7;
}

/* MAIN */
.main {
    padding: 30px;
}

/* TITRE */
h1 {
    margin-top: 0;
}

/* ARTICLE PRINCIPAL */
.hero {
    background: white;
    padding: 25px;
    margin-bottom: 30px;
}

.hero img {
    width: 100%;
    margin-bottom: 15px;
}

/* GRILLE ARTICLES */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-3px);
}

.card img {
    width: 100%;
}

/* MOBILE */
@media (max-width: 768px) {
    .layout {
        grid-template-columns: 1fr;
    }

    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>
